[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["crypto"]

[functions."daily-snapshot"]
  schedule = "5 0 * * *"

[functions."evening-reminder"]
  schedule = "0 17 * * *"

# Static pages served by the React app (keep URLs stable for App Store / external links)
[[redirects]]
  from = "/privacy"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/app/index.html"
  status = 200

# React app at /app/*
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
